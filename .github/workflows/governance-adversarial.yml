name: governance adversarial proof

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

jobs:
  pinned-governance-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pinned public enforcement mechanism
        run: |
          git clone https://github.com/owieschon/agent-governance-lab.git /tmp/agent-governance-lab
          git -C /tmp/agent-governance-lab checkout 218d2dab8ebfa9c6e7a19f065e4a104b94d272d3
      - name: Run full adversarial mechanism suite without stamping source
        run: RAILS_NO_STAMP=1 bash /tmp/agent-governance-lab/rails/adversarial/run_eval.sh
