name: governance adversarial proof

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

jobs:
  pinned-3xit2-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pinned public enforcement mechanism
        run: |
          git clone https://github.com/owieschon/3xit2_demo.git /tmp/3xit2
          git -C /tmp/3xit2 checkout 9dcc4056e5c60fd8794fe86be7c916dd16de5bf3
      - name: Run full adversarial mechanism suite without stamping source
        run: RAILS_NO_STAMP=1 bash /tmp/3xit2/rails/adversarial/run_eval.sh
